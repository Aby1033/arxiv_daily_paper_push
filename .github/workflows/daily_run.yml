name: ArXiv Daily Push

on:
  schedule:
    - cron: '0 1 * * *'  # 每天北京时间上午 9:00 运行 (UTC 01:00)
  workflow_dispatch:     # 允许你手动点击运行按钮测试

# 必须要加这个权限，否则最后的 push 会报 403 错误
permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install arxiv requests

      - name: Run ArXiv Script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
        run: python daily_paper.py

      # --- 就是把下面这段加在整个文件的最后 ---
      - name: Commit and push updated pushed_ids.txt
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add pushed_ids.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update pushed_ids.txt" && git push)
